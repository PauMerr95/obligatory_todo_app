<div class="main">
  <h1>{{ Title }}</h1>
  <label for="addItemInput">What would you like to do?</label>
  <input
    #newItem
    placeholder = "add new item"
    (keyup.enter) = "addItem(newItem.value); newItem.value = ''"
    class = "lg-text-input"
    id = "addItemInput" />
  
  <button class="btn-primary" (click)="addItem(newItem.value)">Add</button>

  <div class="btn-wrapper">
    <button
      class="btn btn-menu"
      [class.active]="filter === 'all'"
      (click)="filter = 'all'">
      All
    </button>

    <button
      class="btn btn-menu"
      [class.active]="filter === 'active'"
      (click)="filter = 'active'">
      Open Tasks
    </button>

    <button
      class="btn btn-menu"
      [class.active]="filter === 'done'"
      (click)="filter = 'done'">
      Completed
    </button>

  </div>

  <h2>
    {{items.length}} <span> @if(items.length === 1) { selected task } @else { selected tasks }</span>
  </h2>
  <ul>
    @for(item of items; track item.description) {
      <li>
        <app-item-component (remove)="remove(item)" [item]="item"></app-item-component>
      </li>
    }
  </ul>
</div>
